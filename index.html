<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <main class="container">
    <h1>pomodoro</h1>
    <div class="clock-display" id="clock-display"></div>
    <div class="time-display" id="time-display">25:00</div>
    <div class="controls">
      <button type="button" class="btn btn-start" onclick="startTimer()">시작</button>
      <button type="button" class="btn btn-stop" onclick="stopTimer()">정지</button>
      <button type="button" class="btn btn-reset" onclick="resetTimer()">초기화</button>
    </div>
    <button type="button" class="btn btn-settings" onclick="location.href='settings.html'">설정</button>
  </main>
  <script src="index.js"></script>
</body>
</html>
